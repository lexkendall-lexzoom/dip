seo:
  title: "Los Angeles Bathhouses, Saunas & Cold Plunge Directory | Dip"
  description: "Dip's Los Angeles guide to bathhouses, saunas, and contrast therapy spots with DipScores, pricing, and editorial picks across LA."
  social_image: "https://cdn.prod.website-files.com/602d8561ae2fe6ec8347c903/694821f6e4ea152155821bfb_6941d327802703cecfad78e5_2026-Esalen_Cliffside_Emily-Miller-1500x775.jpeg"
page:
  heading: "Los Angeles Bathhouses, Saunas & Cold Plunge Directory"
  intro: "Los Angeles offers destination wellness experiences from Venice to Big Sur — hot springs, Korean spas, boutique contrast studios, and floatation. Each venue is independently scored by Dip."
  hero_image: "https://cdn.prod.website-files.com/602d8561ae2fe6ec8347c903/694821f6e4ea152155821bfb_6941d327802703cecfad78e5_2026-Esalen_Cliffside_Emily-Miller-1500x775.jpeg"
