seo:
  title: "New York City Bathhouses, Saunas & Cold Plunge Directory | Dip"
  description: "Dip's New York City guide to bathhouses, saunas, and cold plunge spots with DipScores, pricing, neighborhood context, and editorial picks."
  social_image: "https://images.squarespace-cdn.com/content/v1/5f627ccbb290eb31d9234aee/3945cde9-78a8-4ad9-809f-97e823a756e6/Neutral+Pool+1.jpg"
page:
  heading: "New York City Bathhouses, Saunas & Cold Plunge Directory"
  intro: "Explore Dip's editorial picks across New York City — from membership saunas and full-day banyas to contrast studios and Korean spas. Each venue is scored independently on ritual quality, facilities, and value."
  hero_image: "https://images.squarespace-cdn.com/content/v1/5f627ccbb290eb31d9234aee/3945cde9-78a8-4ad9-809f-97e823a756e6/Neutral+Pool+1.jpg"
cards:
  - eyebrow: "Venue Page"
    title: "Akari Sauna"
    description: "Tokyo sentō tradition transplanted to Brooklyn. Membership-only, perpetually sold out, and worth the wait."
    url: "/new-york-city/akari-sauna/"
    image: "https://cdn.prod.website-files.com/64ee5979ef5937fc52001f92/67f940039615508640a13d94_AKARI-21_3_11zon.jpg"
    score: "9.2"
    audience_rating: "4.9"
  - eyebrow: "Venue Page"
    title: "QC NY"
    description: "55,000 sq ft Italian thermal sanctuary on Governors Island with infinity pools and Manhattan skyline views."
    url: "/new-york-city/qc-ny/"
    image: "https://www.qcny.com/wp-content/uploads/2023/05/qcny-outdoor-pool-skyline.jpg"
    score: "9.2"
    audience_rating: "4.7"
  - eyebrow: "Venue Page"
    title: "Bathhouse Williamsburg"
    description: "Eight thermal pools, a rooftop plunge, and Aufguss ceremonies. The one you bring someone to impress."
    url: "/new-york-city/bathhouse-williamsburg/"
    image: "https://images.squarespace-cdn.com/content/v1/5f627ccbb290eb31d9234aee/3945cde9-78a8-4ad9-809f-97e823a756e6/Neutral+Pool+1.jpg"
    score: "9.0"
    audience_rating: "4.6"
  - eyebrow: "Venue Page"
    title: "Russian & Turkish Baths"
    description: "Open since 1892. The granite room, the Platza scrub, the regulars. Old-school and irreplaceable."
    url: "/new-york-city/russian-and-turkish-baths/"
    image: "https://static.wixstatic.com/media/8c8383_65248793246e915170255dfa9766ff1f.jpg/v1/fit/w_2500,h_1330,al_c/8c8383_65248793246e915170255dfa9766ff1f.jpg"
    score: "8.8"
    audience_rating: "4.5"
  - eyebrow: "Venue Page"
    title: "Elahni"
    description: "A wellness speakeasy in NoMad — guided contrast sessions for four, 180°F sauna to 39°F ice bath, adaptogenic tonic bar."
    url: "/new-york-city/elahni/"
    image: ""
    score: "8.6"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "Mermaid Spa"
    description: "Brooklyn's most authentic Russian banya in Sea Gate — three steam rooms, platza, and an on-site Russian restaurant."
    url: "/new-york-city/mermaid-spa/"
    image: ""
    score: "8.4"
    audience_rating: "4.4"
  - eyebrow: "Venue Page"
    title: "Akari Sauna Williamsburg"
    description: "The 202 Grand Street outpost — membership sauna for daily regulars, Japanese wabi-sabi design, no walk-ins."
    url: "/new-york-city/akari-sauna-williamsburg/"
    image: ""
    score: "8.3"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "AIRE Ancient Baths"
    description: "Candlelit thermal pools in a 140-year-old Tribeca factory. Date night at its most theatrical — and it still earns it."
    url: "/new-york-city/aire-ancient-baths/"
    image: "https://beaire.com/sites/default/files/bg_banner_reserva_h.jpg"
    score: "8.2"
    audience_rating: "4.6"
  - eyebrow: "Venue Page"
    title: "World Spa"
    description: "America's largest banya in Bed-Stuy — seven sauna rooms, snow room, Moroccan hammam. Best value per hour in NYC."
    url: "/new-york-city/world-spa/"
    image: "https://worldspa.com/wp-content/uploads/2024/02/WorldSpa_038.jpg"
    score: "8.2"
    audience_rating: "4.5"
  - eyebrow: "Venue Page"
    title: "The Brooklyn Bathhouse"
    description: "Full thermal circuit in Prospect-Lefferts Gardens — Finnish sauna, steam, two pools, cold plunge, and late-night hours."
    url: "/new-york-city/brooklyn-bathhouse/"
    image: ""
    score: "8.1"
    audience_rating: "4.6"
  - eyebrow: "Venue Page"
    title: "Othership Williamsburg"
    description: "Cedar sauna, 0–4°C ice baths, and guided breathwork by Domino Park. Brooklyn's most sociable contrast experience."
    url: "/new-york-city/othership-williamsburg/"
    image: "https://cdn.prod.website-files.com/67c208983c2848098aa364f1/68c86729b6fd32caa237791c_othership-williamsburg-brooklyn-sauna-interior.avif"
    score: "8.1"
    audience_rating: "4.7"
  - eyebrow: "Venue Page"
    title: "Othership Flatiron"
    description: "Guided sauna and breathwork sessions in Flatiron — the easiest entry point for contrast therapy in Manhattan."
    url: "/new-york-city/othership-flatiron/"
    image: "https://cdn.prod.website-files.com/67c208983c2848098aa364f1/6823ac71cddb5f95242f7b0f_othership-sauna.avif"
    score: "8.0"
    audience_rating: "4.7"
  - eyebrow: "Venue Page"
    title: "SoJo Spa Club"
    description: "Technically New Jersey — but the rooftop infinity pool with Manhattan views is one of the metro's great moments."
    url: "/new-york-city/sojo-spa-club/"
    image: "https://sojospaclub.com/wp-content/uploads/2023/02/sojo-loop-fallback.jpg"
    score: "8.0"
    audience_rating: "4.4"
  - eyebrow: "Venue Page"
    title: "Body by Brooklyn"
    description: "10,000 sq ft in Clinton Hill — Russian sauna, arctic plunge, VIP suites, and a full cocktail bar."
    url: "/new-york-city/body-by-brooklyn/"
    image: ""
    score: "7.9"
    audience_rating: "4.3"
  - eyebrow: "Venue Page"
    title: "Brooklyn Banya"
    description: "No-frills neighborhood banya in Sheepshead Bay. Serious steam, cold water, regulars who know what they came for."
    url: "/new-york-city/brooklyn-banya/"
    image: ""
    score: "7.9"
    audience_rating: "4.2"
  - eyebrow: "Venue Page"
    title: "Great Jones Spa"
    description: "NoHo classic for twenty years — three-story waterfall, weekday passes, and some of the best value in Manhattan wellness."
    url: "/new-york-city/great-jones-spa/"
    image: "https://media.timeout.com/images/100539965/750/422/image.jpg"
    score: "7.8"
    audience_rating: "4.3"
  - eyebrow: "Venue Page"
    title: "Lift / Next Level Floats"
    description: "Eight private float suites in Midtown West — 1,000 lbs of Epsom salt, total darkness, no sound."
    url: "/new-york-city/lift-next-level-floats/"
    image: ""
    score: "7.8"
    audience_rating: "4.5"
  - eyebrow: "Venue Page"
    title: "Remedy Place"
    description: "Ice baths, infrared, hyperbaric O₂, NAD+ drips. The longevity social club with two Manhattan locations."
    url: "/new-york-city/remedy-place/"
    image: "https://cdn.sanity.io/images/jptxcgmn/production/3158497d1fca43ce863df9e06c8c97763d6c44c1-6123x4082.jpg?w=1200&q=85&fit=clip&auto=format"
    score: "7.5"
    audience_rating: "4.4"
  - eyebrow: "Venue Page"
    title: "Spa Castle"
    description: "Five floors of Korean spa in Queens — gold pyramid sauna, no time limit, recently renovated."
    url: "/new-york-city/spa-castle/"
    image: "https://ny.spacastleusa.com/wp-content/uploads/2024/03/327A3713-scaled.jpg"
    score: "7.5"
    audience_rating: "4.2"
  - eyebrow: "Venue Page"
    title: "Lore Bathing Club"
    description: "Daily-use contrast club in NoHo — dry sauna, infrared, cold plunge, designed for frequency not occasion."
    url: "/new-york-city/lore-bathing-club/"
    image: "https://www.azuremagazine.com/wp-content/uploads/2025/12/Azure-Lore-Bathing-Club-Ilse-Crawford-Ringo-Studio-Hero.jpg"
    score: "7.2"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "Wall Street Bath & Spa 88"
    description: "One of the last working banyas in Manhattan. Serious heat, cold water, regulars since before it was FiDi."
    url: "/new-york-city/wall-street-bath-and-spa-88/"
    image: ""
    score: "pending"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "SAINT"
    description: "Four private sauna and ice bath sanctuaries in Chelsea — architecture by BOND, built for stillness."
    url: "/new-york-city/saint/"
    image: "https://framerusercontent.com/images/hoN88F3Z7oX9sX2ryWGdHsJRZ5s.png"
    score: "Coming soon"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "Schwet"
    description: "European banya meets NYC club culture in Tribeca — mineral pool, 48°F plunge, Parcelle wine, dinner parties."
    url: "/new-york-city/schwet/"
    image: "https://framerusercontent.com/images/rG5S8rrqmS6RsKtRaJrujb8FmE0.png"
    score: "Coming soon"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "The Altar"
    description: "Fifty-person sauna, cold plunge, hyperbaric chambers, and Aufguss instructors at 122 Fifth Ave."
    url: "/new-york-city/the-altar/"
    image: "https://one22fifth.wpenginepowered.com/wp-content/uploads/2025/02/Atrium_Renders-1.jpeg"
    score: "Coming soon"
    audience_rating: ""
  - eyebrow: "Venue Page"
    title: "Reunion Baths"
    description: "Community-first bathhouse opening in Brooklyn — hot-cold contrast with a social, neighborhood focus."
    url: "/new-york-city/reunion-baths/"
    image: "/images/uploads/reunion-baths-hero.png"
    score: "Coming soon"
    audience_rating: ""
