  review: >-
    Archimedes runs hot — the Russian steam banya hits 180°F and nobody apologizes for it. The outdoor deck has a cold
    plunge pool and a hot tub, the platza service involves oak or birch branches and someone who knows what they are
    doing, and the whole facility has the easy-going authority of a place that does not need to explain itself to
    newcomers. Thursday through Monday, $45 admission, cash-friendly. The Bay Area has very few real banyas; Archimedes
    is the right one.
