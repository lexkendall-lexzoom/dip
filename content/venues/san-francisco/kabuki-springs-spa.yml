  review: Kabuki is a real communal bathhouse in a city that does not have many of
    them. The Japantown address is correct — the aesthetic is Japanese, the atmosphere
    enforces it, and the bathing sequence (hot pool, cold plunge, steam room, sauna)
    runs according to a logic rather than a trend. Gender-separate days are Monday,
    Wednesday, Friday, Saturday; coed is Sunday. No phones, no music beyond what the
    water provides. At $35 admission it is one of the best thermal values in California.
