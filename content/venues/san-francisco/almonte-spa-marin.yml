  review: 'Mill Valley is twenty minutes from the Golden Gate and a different world
    — redwoods, quiet, the kind of air that slows you down before you even reach the
    door. Almonte leans into this: private outdoor soaking tubs in a garden setting,
    Japanese bathing philosophy, and an atmosphere that genuinely borrows from the
    environment rather than fighting it. Treatments are skilled and the staff understand
    that you are here to actually stop. For a Bay Area soaking experience that earns
    the drive, this is it.'
