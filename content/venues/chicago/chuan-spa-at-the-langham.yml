  review: >-
    Chuan operates on five-element Traditional Chinese Medicine theory — Wood,
    Fire, Earth, Metal, Water — which sounds like marketing until a
    practitioner actually uses it to shape your treatment. The Langham
    Chicago's spa is one of the few hotel wellness offerings in the city that
    earns its price on merit. The indoor pool and vitality pool anchor the
    experience; the treatment rooms are quiet and unhurried. Not a destination
    for contrast therapy purists, but for anyone who wants skilled bodywork
    inside a genuinely calm environment, Chuan delivers. Book the Chuan
    Signature Massage and block out the afternoon.
