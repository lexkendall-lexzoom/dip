  review: >-
    The AIRE formula travels well. Here it is tucked into the historic Michigan Avenue corridor — candlelit, quiet, and
    running the same Roman-Egyptian-Greek thermal sequence the New York location does. Cold bath, warm bath, hot bath,
    float pool, wine bath if you booked it. What AIRE understands that most hotel spas do not is that the ceremony
    matters as much as the temperature. You are not checking into a service; you are moving through something. The
    Chicago location is smaller than Tribeca but executes the ritual cleanly. Bring someone. Respect the silence. Budget
    three hours minimum.
