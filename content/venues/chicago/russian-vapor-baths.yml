  review: >-
    Chicago's Ukrainian Village has been doing this longer than most American cities can claim. Russian Vapor Baths is
    the real thing — a steam room running high, a Turkish bath, cold plunge, and platza oak-branch treatments performed
    by someone who learned the technique from someone who learned it in Russia. The clientele skews older, the
    atmosphere is unpretentious, and nobody is performing wellness. At $45 for a full session it is the best thermal
    value in the city. Call ahead — hours are informal and it is cash only.
