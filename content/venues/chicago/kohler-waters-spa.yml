  review: 'Kohler built its name on water — faucets, bathtubs, fixtures — so it follows
    that their spa applies that same obsession to the human body. The Burr Ridge location
    sits outside the city proper, which filters for intention: you drove here, you
    have the afternoon, you are not rushed. The hydrotherapy sequence is the centerpiece,
    with treatment rooms purpose-built around different water modalities. The product
    quality is high throughout. Worth the drive if you want a full spa day rather
    than a drop-in session.'
