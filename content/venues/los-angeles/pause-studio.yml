  review: >-
    Pause does not try to be a bathhouse or a social wellness club. It is a
    float-and-sauna studio with a clear intention: give you an hour of actual
    stillness in a city that commodifies everything including relaxation. The
    float pods are private, the infrared sauna is well-maintained, and the
    booking system keeps sessions uncrowded. For an LA wellness market full of
    social programming and guided experiences, Pause makes a sensible
    counterpoint — just you, a tank, and silence.
