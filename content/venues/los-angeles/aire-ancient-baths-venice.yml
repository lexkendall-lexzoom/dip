  review: >-
    There is something dissonant and exactly right about AIRE's Venice
    location — Roman thermal pools two blocks from a beach boardwalk. The
    candlelit sequence travels here intact: warm bath, hot bath, cold bath,
    float pool, wine bath if you opted in. AIRE's trick, as always, is
    treating the temperature gradient as a structure rather than a menu.
    Venice adds a rooftop element that the New York location lacks. Book far
    ahead in season, arrive without an agenda, and let the sequence do its
    work.
