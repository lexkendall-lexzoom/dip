  review: >-
    Wi Spa is five floors of Korean jjimjilbang built for people who mean it. The basement pools are gender-separate and
    serious — scalding, neutral, cold, whirlpool, herbal — the main floor is coed in the traditional gown-and-shorts
    setup with heated clay rooms, the roof has a pool. Open 24 hours, $35 admission, everything included. Koreatown's
    version is the flagship of American Korean spas, and at that price point and that scope, nothing else comes close.
    Bring a book, eat the food court ramen, stay four hours.
