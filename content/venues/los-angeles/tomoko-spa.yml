  review: >-
    Tomoko occupies a Beverly Hills shopfront with more visual restraint than most spas in a ten-mile radius, which is
    already a recommendation. The offer is Japanese-leaning: private soaking tubs, shiatsu bodywork, and a quiet that
    feels earned rather than designed. It is not a bathhouse in the communal sense — you have your own private world —
    but the soaking sequence and the bodywork are genuinely good. For couples or anyone wanting a Japanese spa
    experience without a flight to Japan or a trip to a Korean spa in Koreatown, Tomoko fills the gap precisely.
