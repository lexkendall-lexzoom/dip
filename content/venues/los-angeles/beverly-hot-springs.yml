  review: Beverly Hot Springs sits over one of Los Angeles' only natural underground
    hot springs, which feeds the pools without any heating system. That fact alone
    makes it worth understanding. The Korean-owned facility has been here since 1984,
    the body scrub attendants are expert, and the clientele mixes Korean regulars
    with curious newcomers in exactly the proportion you want. Gender-separate days
    mean men and women alternately get the full facility. No performance, no branding,
    just hot mineral water doing what it has always done.
