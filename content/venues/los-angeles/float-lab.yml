  review: Float Lab is not trying to be a wellness destination — it is a float tank
    studio that has been doing this since before float tanks became a lifestyle product.
    The chambers are large, the magnesium water is dense, and the staff are matter-of-fact
    in the way that signals expertise. West LA has newer, shinier options. Float Lab
    has the track record. First float, expect forty-five minutes to stop thinking
    about floating. Return visits are where it pays off.
