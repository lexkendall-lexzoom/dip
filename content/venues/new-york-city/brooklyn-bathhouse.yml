  review: >-
    Opened in January 2025 at 731 Flatbush Avenue, The Brooklyn Bathhouse brings a proper thermal circuit to
    Prospect-Lefferts Gardens — a neighborhood that has needed one. The lineup is comprehensive: Finnish dry sauna, wet
    sauna, steam room, two heated pools at different temperatures, and a cold plunge, all priced with unusual
    accessibility for New York. Day passes run four hours with tiered pricing that rewards early birds and off-peak
    visitors. Zurilee Pizzeria on-site means you can make an evening of it.
