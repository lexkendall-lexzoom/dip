  one_line_verdict: The best full-day thermal value in the greater NYC area — technically New Jersey, functionally one of New York's greatest wellness destinations.
  editorial_overview: |
    SoJo Spa Club in Edgewater, New Jersey is 240,000 square feet of Korean spa infrastructure with a Manhattan skyline view that hits differently from a rooftop infinity pool. Nineteen water features, seven distinct sauna rooms, an indoor spa floor with Korean treatments, a full restaurant, an outdoor pool complex, and a rooftop that makes the 15-minute bus ride from Port Authority feel like a significant undercharge.

    The Korean spa model here is fully realized — this is a proper jjimjilbang at resort scale. The thermal circuit is comprehensive: dry and wet saunas across multiple themed rooms, cold plunge pools, hot tubs, and relaxation areas. The outdoor pool and rooftop area are open seasonally and represent the best view-to-price ratio of any water feature in the NYC metro.

    The transit reality deserves direct address: take the NJ Transit 158 bus from Port Authority to Edgewater. It costs about $3.50 and runs frequently. The Uber is $15 and also fine. There is no logical reason to avoid this venue because of the New Jersey designation. The rooftop infinity pool with Lower Manhattan across the Hudson is one of the cleanest dramatic moments available in the entire regional wellness scene.
  vibe: Genuinely diverse and unpretentious. Korean-American community core alongside a broad cross-section of NYC area residents who've discovered the value. Families, couples, friend groups, solo day-trippers. The scale means you rarely feel crowded even on busy days.
  facility_breakdown: Seven sauna rooms covering dry, wet, infrared, salt, and themed formats. Nineteen water features across indoor and outdoor areas. Korean spa floor with traditional treatment menu including body scrubs (때밀이) and massages. Full restaurant with Korean and American options. Seasonal outdoor pool and rooftop area. Locker facilities are large and well-organized.
  pros:
    - Rooftop infinity pool with Manhattan skyline view is a genuinely extraordinary feature
    - 240,000 sq ft means you never feel the crowd even on weekends
    - Korean spa floor with authentic body scrub service
    - Day pass pricing is among the best value in the NYC metro area
    - The transit ride is 15 minutes from Midtown — barely longer than many in-city commutes
  cons:
    - The New Jersey designation creates a psychological barrier that some visitors never get past
    - Outdoor pool area is seasonal — winter visits miss the headline feature
    - The scale can feel impersonal for people who prefer intimate spaces
    - Restaurant is functional rather than excellent
  not_ideal_for: People committed to staying within NYC limits, visitors who want a curated intimate experience, anyone who finds large-format venues overwhelming.
  pro_move: Go on a weekday afternoon in late spring or early fall — outdoor and rooftop areas are open, crowds are thin, and the sunset view from the rooftop infinity pool with Manhattan lit up is among the great free (well, $90) moments in regional wellness.
  value_read: $90 for full-day unlimited access to 19 water features, 7 saunas, and a Korean spa floor is probably the best price-to-facility ratio in the entire NYC metro area. The rooftop pool alone justifies the trip.
  scene_summary: SoJo is a quietly essential part of the NYC wellness ecosystem — understated in the cultural conversation relative to its actual quality, which means it's reliably less crowded than comparable venues with less to offer. The rooftop infinity pool has become a word-of-mouth recommendation that drives new visitor flow. Steady trajectory; no signs of declining relevance.
  crowd_profile: Diverse NYC metro cross-section — Korean-American community core, Manhattan professionals doing a day trip, couples on a budget date, family groups, solo wellness regulars. The scale accommodates all of these without friction. Behavior is relaxed and unhurried; the Korean spa ethos of spending time dominates over any wellness performance.
  time_of_day_dynamics: Weekday mornings are the least crowded and best for an unhurried full circuit. Afternoon fills with day-trippers and groups. Evenings are quieter indoors but the rooftop closes earlier. Weekend afternoons are the busiest. Summer weekends require earlier arrival for rooftop access.
  popularity_trend: steady
  booking_difficulty: Easy — walk-in most days. Advance booking available online but rarely necessary except on peak summer weekend days.
