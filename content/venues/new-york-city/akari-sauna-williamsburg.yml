  review: 'Akari is doing something deliberately countercultural in the NYC sauna scene: no day passes, no drop-ins, no noise. This Williamsburg outpost (202 Grand Street) and its Greenpoint sibling operate on membership only — monthly plans starting at $165, no long-term commitment — granting access to clean infrared saunas, cold plunge tubs, and quiet relaxation rooms designed around Japanese wabi-sabi principles. The result is a community of regulars who treat it as a daily ritual rather than an occasion. If you can commit, it earns its dues.'
