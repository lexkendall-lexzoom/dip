  review: >-
    Lore Bathing Club opened in NoHo in late 2025 designed by Ilse Crawford's Studioilse, whose portfolio includes
    Aesop interiors. Finnish dry sauna, infrared sauna, cold plunge pool. Monthly membership from $225, single session
    $55. The design is the best in any NYC bathing venue. The thesis is that bathing should be a daily habit, not a
    special occasion. The proof is whether the daily-habit model holds as the membership fills. Score reflects a venue
    still finding its stride.
  one_line_verdict: >-
    A NoHo bathing club designed by Studioilse for daily habit rather than occasion visits. The design is the best in the city. Whether the thesis holds is the open question.
  editorial_overview: |
    Lore Bathing Club is a design-forward concept with an unusual argument: that the destination-experience model driving the current NYC bathing revival is the wrong model for what bathing is actually for. The founders come from Lifetime Fitness and NeueHouse, which means the infrastructure handles real daily-use volume without degrading. The designer is Ilse Crawford's Studioilse, whose work is built on the premise that considered materials change how people use a space over time. Natural wood, stone, linen, deliberate acoustics. The result is 5,000 square feet in NoHo that feels like a private home rather than a wellness product.

    The circuit is deliberately narrow: Finnish dry sauna, infrared sauna, cold plunge pool. No thermal pools, no Aufguss, no circuit variety. The restraint is the point. Lore is trying to be the place you go four mornings a week in February because it's part of how your day works, not the place you book for a Saturday with friends. Designing something good enough to return to every day is a harder problem than designing something impressive enough to visit once. They understand this distinction, and the Studioilse commission is the evidence.

    At $225 per month for unlimited access, the membership only works for committed frequent users. That's the point. The $55 single session is the right entry: three visits in a week will tell you whether the daily-habit model fits how you actually live. Our score reflects a venue still building its community and proving its thesis rather than a negative judgment on the concept. The venue is currently quieter than it will be, which for the people discovering it this month is actually a feature. If your bookshelves include Phaidon titles and you have opinions about materials, you already know whether this is your place.
  vibe: Quiet, design-literate, and intentional. NoHo creative-professional crowd who read Azure Magazine and have opinions about materials. The membership model means the regulars are genuinely regular — you see the same faces, which creates a low-key community without anyone trying to manufacture it.
  facility_breakdown: Finnish dry sauna, infrared sauna, cold plunge pool, and relaxation areas. The Studioilse design means every material choice is considered — natural wood, stone, linen, deliberate acoustics. The locker facilities reflect the same care. Not the widest facility range, but executed at a level of quality that broader facilities rarely achieve.
  pros:
    - Studioilse design is the best interior design of any NYC bathing venue — genuinely considered
    - Membership model selects for committed regulars who elevate the atmosphere
    - Daily-use infrastructure means operations don't degrade with volume
    - $55 single session is accessible for trying before committing
    - NoHo location is central and walkable
  cons:
    - Facility scope is narrow — no thermal pools, limited circuit variety
    - Score reflects a venue still finding its community — earlier than most entries
    - $225/month requires genuine frequency to justify
    - Not a destination experience or a full-circuit bathhouse
  not_ideal_for: People seeking a wide thermal circuit, anyone wanting social energy or community events, casual drop-in visitors without a regular practice.
  pro_move: Use the $149 7-day pass to genuinely test whether the daily-habit model fits your routine before committing to a membership. Three visits in a week will tell you everything about whether this should be your bathing venue.
  value_read: The membership math works if you go 4+ times per week. The session rate ($55) is fair for what you're getting. The design premium is real but so is the quality of the environment it creates.
  scene_summary: Lore is the most architecturally serious wellness space to open in NYC in recent memory. It's still building its community — the membership base is growing but the venue is young. For the right person (daily practice, design-sensitive, NoHo-adjacent), it's likely to become their primary bathing venue. Rising trend with genuine staying power if the membership model takes hold.
  crowd_profile: 28–45, creative and media-adjacent professionals, architecture and design community members, NeueHouse alumni, people whose bookshelves include Phaidon titles. Behavior is quiet, self-directed, and unhurried. Nobody is explaining what they're doing or why.
  time_of_day_dynamics: Morning sessions (7–9am) are the daily ritual crowd — quiet, purposeful, efficient. Midday has the design professional lunch crowd. Evenings shift toward a slower, more contemplative energy. Weekends have a warmer social quality as members linger longer. The space genuinely rewards unhurried visits at any hour.
  popularity_trend: rising
  booking_difficulty: Easy — the venue is still building its membership base. Sessions available most times. This will change as membership fills.
