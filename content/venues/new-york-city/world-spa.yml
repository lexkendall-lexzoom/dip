  review: >-
    World Spa opened in Bed-Stuy in 2021 and claimed a category nobody else was occupying: the serious banya
    destination that also functions as a genuine late-night gathering place. Seven distinct sauna environments, a
    Moroccan hammam with an actual attendant, multiple pools, a restaurant worth eating at, and hours until 3am Friday
    through Saturday. No time limit. The longer you stay, the better the math gets. The wellness press undercovers this
    place consistently. Don't make the same mistake.
