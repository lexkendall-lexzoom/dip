  review: Mermaid Spa is Brooklyn's most authentic Russian banya — a wood-and-slate
    lodge marooned in the quiet enclave of Sea Gate, where three full steam rooms,
    a scorching dry sauna, a Turkish bath, two tile ice pools, and a circular jacuzzi
    constitute one of the city's most complete thermal sequences. The clientele is
    regulars-first, the platza sessions with birch or oak venik are the real draw,
    and the on-site Russian restaurant keeps you from leaving prematurely. 4-hour
    timed admission; membership packages available for the converted.
