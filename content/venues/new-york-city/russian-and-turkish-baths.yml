  review: >-
    The Russian and Turkish Baths on East 10th Street is one of the last physical connections to New York's immigrant
    bathhouse culture. The granite room runs genuine heat. The platza is performed by attendants who have done this more
    times than you've been to the gym. The crowd is eclectic in a way no designed wellness venue can replicate. It is
    not Instagram-ready, and that is not incidental to what makes it irreplaceable.
