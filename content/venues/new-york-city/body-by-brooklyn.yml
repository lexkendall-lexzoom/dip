  review: >-
    Body by Brooklyn is Clinton Hill's 10,000-square-foot neighborhood spa
    with genuine bathhouse credentials — a Russian sauna running 175–190°F, a
    Swedish sauna, an arctic cold plunge, eucalyptus steam room, and a thermal
    hot tub, all anchored by a full dry lounge with fireplace, day beds, and a
    bar. Day passes run $65–$75 depending on day; VIP suites add a private
    jacuzzi, steam shower, and champagne for groups or couples looking to
    extend the occasion. The treatment menu is expansive: facials, deep
    tissue, platza, body wraps. It skews more spa than banya but covers both
    worlds.
