  not_ideal_for: Anyone seeking a full thermal circuit, cold plunge enthusiasts, people who want a destination-level experience.
  pro_move: Book an evening outdoor soak in cooler months. The combination of cold air and hot water is the experience CityWell does better than anyone else in the neighborhood.
  value_read: At $65, it's positioned as a regular-use spa rather than an occasion splurge. The value is strongest for locals who use it weekly. One-time visitors may find the scope limited relative to price.
  scene_summary: CityWell fills the neighborhood spa gap in Williamsburg — a low-key alternative to the higher-production thermal venues in the area. Steady local clientele. Not trending, not trying to.
