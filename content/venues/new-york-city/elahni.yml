  review: 'Elahni describes itself as a wellness speakeasy, and the phrase earns its keep. This intimate NoMad studio limits sessions to four guests at a time, guiding each through a Finnish sauna at 180°F followed by an ice bath held at 39°F — the thermal gap structured for nervous system impact, not just heat tolerance. The founders often run sessions themselves. Afterward, an adaptogenic tonic bar offers curated non-alcoholic beverages calibrated to desired states: energized or grounded. At $65 for a 60-minute semi-private session, it is priced accessibly for what amounts to one of the most intentional contrast experiences in the city.'
