  review: >-
    A fifty-person sauna, cold plunge suite, hyperbaric chambers, PEMF mats,
    and Aufguss instructors who understand pacing. The Altar is going after
    the longevity crowd with a genuinely communal angle — the Fifth Avenue
    address positions it between the wellness-curious office crowd and the
    committed biohackers. The space is designed as a ritual chamber rather
    than a recovery clinic, which is the right instinct. Opening in 2026;
    worth tracking.
