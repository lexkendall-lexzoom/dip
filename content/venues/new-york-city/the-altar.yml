  not_ideal_for: Anyone needing a venue that's open now, people who want the intimate small-group experience, visitors prioritizing thermal pool circuits over sauna-focused programming.
  pro_move: Join the waitlist now and monitor opening announcements. The Aufguss programming in a 50-person ceremonial sauna room is a format with no direct NYC competitor at this scale.
  value_read: At from $65, the price positioning is accessible if the programming delivers. The hyperbaric and PEMF add-ons will carry premium pricing — the base rate is the entry to the sauna and cold plunge circuit.
  scene_summary: The Altar is the most anticipated 2026 wellness opening in NYC's bathhouse category. The combination of large-scale Aufguss ceremony and longevity modalities in a Fifth Avenue location has no direct precedent. Confidence in the concept is high based on team and design signals; execution confidence awaits opening data.
