  review: One of the last working banyas left in Manhattan. No rooftop, no cocktail bar, no candlelight — just serious heat, cold water, and the kind of regulars who have been coming since before the neighborhood was called FiDi. The sauna runs hot and the platza service is available if you know to ask. Worth knowing about.
