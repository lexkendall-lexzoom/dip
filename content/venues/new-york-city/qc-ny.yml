  review: 'QC NY is New York City's most transportive spa experience — an Italian thermal sanctuary occupying 55,000 square feet of a Victorian military barracks on Governors Island, with heated infinity pools that frame the Lower Manhattan skyline in a way that feels almost impossibly cinematic. The thermal circuit spans 20+ experiences: multi-themed saunas, infrared beds, ice rooms, salt chambers, and Vichy showers, all arranged with the unhurried logic of a QC Terme property. The ferry crossing is part of the ritual. Admission includes robe, towel, locker, and sandals; the Casa QC Bistro handles everything else.'
