  audience_sentiment_snapshot: Overwhelmingly positive across all platforms. The most common praise: the views, the scale, the ferry ritual. The most common complaint: booking difficulty and weekend crowds at the outdoor pools. Consistent mentions in "best of NYC" wellness lists across press outlets. Instagram content from the outdoor infinity pool drives a significant portion of new bookings.
