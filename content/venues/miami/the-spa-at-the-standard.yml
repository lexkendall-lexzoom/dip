  review: The Standard on Belle Isle has a longer claim on Miami spa culture than
    almost anything else in the city. The outdoor hot tub sits above the causeway
    water; the mud tub is communal and correctly absurd; the waterside hammocks are
    where afternoons go to dissolve. The treatments are strong, the architecture is
    mid-century and light-filled, and the clientele mixes in-the-know Miamians with
    design-hotel regulars from elsewhere. Day passes are available. Go on a weekday
    if you can.
