  review: >-
    Carillon spans 70,000 square feet on Miami Beach and treats wellness as
    architecture rather than amenity. The thermal circuit moves from hot pools
    to steam rooms to cold plunge to hammam — the sequence is long enough that
    you actually decompress rather than just check boxes. The fitness center
    is world-class if you use it, but the spa side alone justifies the trip.
    Day passes are available and worth it: you get access to everything, and
    everything is genuinely good. The best wellness facility per square foot
    in South Florida.
