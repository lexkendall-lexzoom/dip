  review: >-
    Âme Spa at SLS Brickell is a full hotel spa in the European tradition —
    steam room, sauna, hydrotherapy circuit, treatment rooms done in a cool
    minimal palette. The address is Brickell, which means it catches the
    finance-world clientele who need the full-service option and do not want
    to drive to South Beach for it. The execution is reliable: skilled
    therapists, clean facilities, no pretension. Not a destination spa in the
    grand-pilgrimage sense, but a well-run option for the Brickell corridor.
