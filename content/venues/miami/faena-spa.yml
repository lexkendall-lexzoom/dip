  review: Faena is one of the most aesthetically committed hotels in the Americas,
    and the spa holds that standard. Gold leaf, crimson upholstery, a surrealist sensibility
    that should be excessive and somehow holds. The indoor pool and steam facilities
    are available to day guests; the treatment rooms are purpose-designed around specific
    ritual sequences. The price point is real — this is not a budget spa day — but
    the craft matches the setting. For Miami Beach, where wellness has a tendency
    to prioritize scene over experience, Faena's spa is the exception.
