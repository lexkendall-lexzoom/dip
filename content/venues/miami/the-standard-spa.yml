  review: >-
    The Standard Miami sits on the inland waterway side of Belle Isle — a 1955
    Lapidus-era building with a pool deck that feels designed for unhurried
    afternoons. The spa extends the hotel's philosophy: nothing is rushed, the
    mud scrub station is communal and low-key, the cold plunge is available
    when you want it. The treatment menu is full-service without being
    overwhelming. This is the Miami beach spa experience that made other Miami
    beach spas feel obligated to have one. Classics earn their status.
