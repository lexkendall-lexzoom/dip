backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

editor:
  preview: true

collections:
  - name: "site_content"
    label: "Site Content"
    format: "yaml"
    extension: "yml"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "content/homepage.yml"
        preview_path: "/"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "social_image", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - label: "Quick List Venues"
                name: "quick_list"
                widget: "list"
                summary: "{{fields.venue_name}}"
                field: { label: "Venue Name", name: "venue_name", widget: "string" }
          - label: "Newsletter Callout"
            name: "newsletter"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "cities"
        label: "Cities Page"
        file: "content/pages/cities.yml"
        preview_path: "/cities/"
        fields: &page_fields
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "social_image", widget: "image", required: false }
          - label: "Page Content"
            name: "page"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Cards"
            name: "cards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link URL", name: "url", widget: "string" }
              - { label: "Card Image", name: "image", widget: "image", required: false }

      - name: "new_york_city"
        label: "New York City Page"
        file: "content/pages/new-york-city.yml"
        preview_path: "/new-york-city/"
        fields: *page_fields

      - name: "los_angeles"
        label: "Los Angeles Page"
        file: "content/pages/los-angeles.yml"
        preview_path: "/los-angeles/"
        fields: *page_fields

      - name: "miami"
        label: "Miami Page"
        file: "content/pages/miami.yml"
        preview_path: "/miami/"
        fields: *page_fields

      - name: "san_francisco"
        label: "San Francisco Page"
        file: "content/pages/san-francisco.yml"
        preview_path: "/san-francisco/"
        fields: *page_fields

      - name: "chicago"
        label: "Chicago Page"
        file: "content/pages/chicago.yml"
        preview_path: "/chicago/"
        fields: *page_fields

  - name: "venues_new_york_city"
    label: "Venues · New York City"
    format: "yaml"
    extension: "yml"
    folder: "content/venues/new-york-city"
    create: true
    slug: "{{slug}}"
    preview_path: "/new-york-city/{{slug}}/"
    summary: "{{venue.name}}"
    fields: &venue_fields
      - label: "SEO"
        name: "seo"
        widget: "object"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Social Image", name: "social_image", widget: "image", required: false }
      - label: "Venue Content"
        name: "venue"
        widget: "object"
        fields:
          - { label: "Venue Name", name: "name", widget: "string" }
          - { label: "City", name: "city", widget: "string" }
          - label: "City Slug"
            name: "city_slug"
            widget: "select"
            required: false
            options:
              - { label: "New York City", value: "new-york-city" }
              - { label: "Los Angeles", value: "los-angeles" }
              - { label: "Miami", value: "miami" }
              - { label: "San Francisco", value: "san-francisco" }
              - { label: "Chicago", value: "chicago" }
              - { label: "Berlin", value: "berlin" }
          - { label: "Slug", name: "slug", widget: "string" }
          - label: "Status"
            name: "status"
            widget: "select"
            required: false
            options:
              - { label: "Draft", value: "draft" }
              - { label: "Live", value: "live" }
              - { label: "Archived", value: "archived" }
          - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Gallery"
            name: "gallery"
            widget: "list"
            required: false
            field: { label: "Image", name: "image", widget: "image" }
          - { label: "Neighborhood", name: "neighborhood", widget: "string", required: false }
          - { label: "Address", name: "address", widget: "text", required: false }
          - { label: "Price", name: "price", widget: "string", required: false }
          - label: "Price Range"
            name: "price_range"
            widget: "select"
            required: false
            options: ["$", "$$", "$$$", "$$$$", "$$$$$"]
          - { label: "Score", name: "score", widget: "string", required: false }
          - { label: "Dip Score", name: "dip_score", widget: "number", required: false, value_type: "float", min: 0, max: 100 }
          - { label: "Date Reviewed", name: "date_reviewed", widget: "string", required: false }
          - { label: "Hours", name: "hours", widget: "string", required: false }
          - { label: "Best For", name: "best_for", widget: "string", required: false }
          - label: "Primary Category"
            name: "primary_category"
            widget: "select"
            required: false
            options:
              - "Luxury Bathhouse"
              - "Social Sauna"
              - "Traditional Banya"
              - "Social Wellness Club"
              - "Neighborhood Spa"
              - "Regional Spa Resort"
          - label: "Secondary Categories"
            name: "secondary_categories"
            widget: "list"
            required: false
            field:
              label: "Category"
              name: "category"
              widget: "select"
              options:
                - "Luxury Bathhouse"
                - "Social Sauna"
                - "Traditional Banya"
                - "Social Wellness Club"
                - "Neighborhood Spa"
                - "Regional Spa Resort"
          - label: "Bathing Style"
            name: "bathing_style"
            widget: "select"
            required: false
            options:
              - "Roman Thermal"
              - "Nordic Sauna"
              - "Russian Banya"
              - "Turkish Hammam"
              - "Korean Jjimjilbang"
              - "Japanese Onsen"
              - "Modern Hybrid"
              - "Other"
          - label: "Amenities"
            name: "amenities"
            widget: "list"
            required: false
            field:
              label: "Amenity"
              name: "amenity"
              widget: "select"
              options:
                - "cold plunge"
                - "steam room"
                - "thermal pools"
                - "dry sauna"
                - "infrared sauna"
                - "rooftop"
                - "massage"
                - "restaurant"
                - "outdoor bathing"
                - "private bathing"
                - "guided ritual"
                - "social lounge"
          - { label: "Website URL", name: "website", widget: "string", required: false }
          - { label: "Official Website URL", name: "website_url", widget: "string", required: false }
          - { label: "Booking URL", name: "booking_url", widget: "string", required: false }
          - { label: "Short Description", name: "description_short", widget: "text", required: false }
          - { label: "Long Description", name: "description_long", widget: "text", required: false }
          - { label: "Dip Review", name: "review", widget: "text", required: false }
          - label: "Source Links"
            name: "source_links"
            widget: "list"
            required: false
            field: { label: "Source URL", name: "url", widget: "string" }
          - { label: "Source Confidence", name: "source_confidence", widget: "number", required: false, value_type: "float", min: 0, max: 1 }
          - { label: "Source Last Verified At", name: "source_last_verified_at", widget: "datetime", required: false }
          - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
          - { label: "Needs Review", name: "needs_review", widget: "boolean", required: false, default: false }
          - label: "Gallery Images"
            name: "gallery_images"
            widget: "list"
            required: false
            field: { label: "Image", name: "image", widget: "image" }

  - name: "venues_los_angeles"
    label: "Venues · Los Angeles"
    format: "yaml"
    extension: "yml"
    folder: "content/venues/los-angeles"
    create: true
    slug: "{{slug}}"
    preview_path: "/los-angeles/{{slug}}/"
    summary: "{{venue.name}}"
    fields: *venue_fields

  - name: "venues_miami"
    label: "Venues · Miami"
    format: "yaml"
    extension: "yml"
    folder: "content/venues/miami"
    create: true
    slug: "{{slug}}"
    preview_path: "/miami/{{slug}}/"
    summary: "{{venue.name}}"
    fields: *venue_fields

  - name: "venues_san_francisco"
    label: "Venues · San Francisco"
    format: "yaml"
    extension: "yml"
    folder: "content/venues/san-francisco"
    create: true
    slug: "{{slug}}"
    preview_path: "/san-francisco/{{slug}}/"
    summary: "{{venue.name}}"
    fields: *venue_fields

  - name: "venues_chicago"
    label: "Venues · Chicago"
    format: "yaml"
    extension: "yml"
    folder: "content/venues/chicago"
    create: true
    slug: "{{slug}}"
    preview_path: "/chicago/{{slug}}/"
    summary: "{{venue.name}}"
    fields: *venue_fields
