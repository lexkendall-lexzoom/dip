backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

editor:
  preview: true

collections:
  - name: "site_content"
    label: "Site Content"
    format: "yaml"
    extension: "yml"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "content/homepage.yml"
        preview_path: "/"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "social_image", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - label: "Quick List Venues"
                name: "quick_list"
                widget: "list"
                summary: "{{fields.venue_name}}"
                field: { label: "Venue Name", name: "venue_name", widget: "string" }
          - label: "Newsletter Callout"
            name: "newsletter"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "cities"
        label: "Cities Page"
        file: "content/pages/cities.yml"
        preview_path: "/cities/"
        fields: &page_fields
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "social_image", widget: "image", required: false }
          - label: "Page Content"
            name: "page"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Cards"
            name: "cards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link URL", name: "url", widget: "string" }
              - { label: "Card Image", name: "image", widget: "image", required: false }

      - name: "new_york_city"
        label: "New York City Page"
        file: "content/pages/new-york-city.yml"
        preview_path: "/new-york-city/"
        fields: *page_fields

      - name: "los_angeles"
        label: "Los Angeles Page"
        file: "content/pages/los-angeles.yml"
        preview_path: "/los-angeles/"
        fields: *page_fields

      - name: "miami"
        label: "Miami Page"
        file: "content/pages/miami.yml"
        preview_path: "/miami/"
        fields: *page_fields

      - name: "san_francisco"
        label: "San Francisco Page"
        file: "content/pages/san-francisco.yml"
        preview_path: "/san-francisco/"
        fields: *page_fields

      - name: "chicago"
        label: "Chicago Page"
        file: "content/pages/chicago.yml"
        preview_path: "/chicago/"
        fields: *page_fields

  - name: "venues"
    label: "Venues"
    format: "yaml"
    extension: "yml"
    folder: "content/venues"
    create: true
    path: "{{venue.city}}/{{slug}}"
    slug: "{{slug}}"
    preview_path: "/{{venue.city}}/{{slug}}/"
    summary: "{{venue.name}}"
    fields: &venue_fields
      - label: "SEO"
        name: "seo"
        widget: "object"
        fields:
          - { label: "Page Title", name: "title", widget: "string", required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
          - { label: "Social Image", name: "social_image", widget: "image", required: false }
      - label: "Venue"
        name: "venue"
        widget: "object"
        fields:
          # Basic Info
          - { label: "Name", name: "name", widget: "string", required: true }
          - { label: "Slug", name: "slug", widget: "string", required: true }
          - { label: "Status", name: "status", widget: "select", required: true, options: ["draft", "review", "published", "archived"], default: "draft" }
          - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
          - { label: "Short Description", name: "short_description", widget: "text", required: true }
          - { label: "Long Description", name: "long_description", widget: "text", required: false }
          - { label: "Tagline", name: "tagline", widget: "string", required: false }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Gallery"
            name: "gallery"
            widget: "list"
            required: false
            field: { label: "Image", name: "image", widget: "image", required: true }

          # Location
          - { label: "City (slug)", name: "city", widget: "select", required: true, options: [{ label: "New York City", value: "new-york-city" }, { label: "Los Angeles", value: "los-angeles" }, { label: "Miami", value: "miami" }, { label: "San Francisco", value: "san-francisco" }, { label: "Chicago", value: "chicago" }, { label: "Berlin", value: "berlin" }] }
          - { label: "Region", name: "region", widget: "string", required: false }
          - { label: "Country", name: "country", widget: "string", required: true }
          - { label: "Neighborhood", name: "neighborhood", widget: "string", required: false }
          - { label: "Address", name: "address", widget: "string", required: false }
          - { label: "Latitude", name: "lat", widget: "number", value_type: "float", required: false }
          - { label: "Longitude", name: "lng", widget: "number", value_type: "float", required: false }

          # Experience
          - { label: "Primary Archetype", name: "primary_archetype", widget: "select", required: true, options: ["Luxury Bathhouse", "Social Sauna", "Traditional Banya", "Social Wellness Club", "Neighborhood Spa", "Regional Spa Resort", "Other"] }
          - { label: "Secondary Archetypes", name: "secondary_archetypes", widget: "select", required: false, multiple: true, options: ["Luxury Bathhouse", "Social Sauna", "Traditional Banya", "Social Wellness Club", "Neighborhood Spa", "Regional Spa Resort", "Other"] }
          - { label: "Atmosphere Tags", name: "atmosphere_tags", widget: "select", required: false, multiple: true, options: ["quiet", "social", "dimly-lit", "high-design", "ritual-led", "community", "recovery-focused"] }
          - { label: "Social Style", name: "social_style", widget: "select", required: false, options: ["quiet", "balanced", "social", "event-driven"] }
          - { label: "Setting Tags", name: "setting_tags", widget: "select", required: false, multiple: true, options: ["urban", "hotel", "destination", "waterfront", "nature", "underground"] }
          - { label: "Bathhouse Type", name: "bathhouse_type", widget: "select", required: false, options: ["bathhouse", "sauna_club", "spa", "wellness_studio", "onsen", "hammam", "banya", "other"] }
          - { label: "Hours", name: "hours", widget: "string", required: false }
          - { label: "Price Tier", name: "price_tier", widget: "string", required: false }
          - { label: "Reservation Required", name: "reservation_required", widget: "boolean", required: false, default: false }

          # Amenities / Rituals
          - { label: "Amenities", name: "amenities", widget: "select", required: false, multiple: true, options: ["sauna", "steam", "cold-plunge", "hot-pool", "thermal-circuit", "massage", "bodywork", "recovery-clinic", "iv-therapy", "hyperbaric", "red-light", "cryotherapy"] }
          - { label: "Rituals", name: "rituals", widget: "select", required: false, multiple: true, options: ["guided-ritual", "aufguss", "venik", "sound-bath", "breathwork", "meditation", "contrast-circuit"] }

          # SEO
          - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
          - { label: "SEO Image", name: "seo_image", widget: "image", required: false }
          - { label: "Canonical Path Override", name: "canonical_path_override", widget: "string", required: false }

          # Publishing / Internal
          - { label: "Website URL", name: "website_url", widget: "string", required: false }
          - { label: "Booking URL", name: "booking_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "Editor Notes", name: "editor_notes", widget: "text", required: false }
          - { label: "Source URLs", name: "source_urls", widget: "list", required: false, field: { label: "Source URL", name: "source_url", widget: "string" } }
          - { label: "Last Verified At", name: "last_verified_at", widget: "datetime", required: false, format: "YYYY-MM-DDTHH:mm:ss[Z]", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
