backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

editor:
  preview: true

collections:
  - name: "site_content"
    label: "Site Content"
    format: "yaml"
    extension: "yml"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "content/homepage.yml"
        preview_path: "/"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "social_image", widget: "image", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - label: "Quick List Venues"
                name: "quick_list"
                widget: "list"
                summary: "{{fields.venue_name}}"
                field: { label: "Venue Name", name: "venue_name", widget: "string" }
          - label: "Newsletter Callout"
            name: "newsletter"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "cities"
        label: "Cities Page"
        file: "content/pages/cities.yml"
        preview_path: "/cities/"
        fields: &page_fields
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Image", name: "social_image", widget: "image", required: false }
          - label: "Page Content"
            name: "page"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Cards"
            name: "cards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link URL", name: "url", widget: "string" }
              - { label: "Card Image", name: "image", widget: "image", required: false }

      - name: "new_york_city"
        label: "New York City Page"
        file: "content/pages/new-york-city.yml"
        preview_path: "/new-york-city/"
        fields: *page_fields

      - name: "los_angeles"
        label: "Los Angeles Page"
        file: "content/pages/los-angeles.yml"
        preview_path: "/los-angeles/"
        fields: *page_fields

      - name: "miami"
        label: "Miami Page"
        file: "content/pages/miami.yml"
        preview_path: "/miami/"
        fields: *page_fields

      - name: "san_francisco"
        label: "San Francisco Page"
        file: "content/pages/san-francisco.yml"
        preview_path: "/san-francisco/"
        fields: *page_fields

      - name: "chicago"
        label: "Chicago Page"
        file: "content/pages/chicago.yml"
        preview_path: "/chicago/"
        fields: *page_fields

  - name: "venues"
    label: "Venues"
    description: "Universal editor for DipDays venue pages across all city folders."
    format: "yaml"
    extension: "yml"
    folder: "content/venues"
    create: false
    slug: "{{slug}}"
    nested:
      depth: 3
      summary: "{{dirname}} / {{filename}}"
    preview_path: "/{{path}}/"
    identifier_field: "venue.name"
    summary: "{{venue.city}} · {{venue.name}}"
    sortable_fields: ["commit_date", "title", "venue.city", "venue.slug", "venue.status", "venue.last_verified_at"]
    search_fields: ["venue.name", "venue.slug", "venue.city", "venue.region", "venue.country", "venue.neighborhood", "venue.primary_archetype", "venue.secondary_archetypes", "venue.amenities", "venue.rituals", "venue.atmosphere_tags", "venue.setting_tags", "venue.status"]
    view_groups:
      - label: "By City"
        field: "venue.city"
      - label: "By Status"
        field: "venue.status"
      - label: "By Archetype"
        field: "venue.primary_archetype"
    fields:
      - label: "SEO"
        name: "seo"
        widget: "object"
        hint: "Optional overrides. Leave blank to fall back to defaults where available."
        fields:
          - { label: "SEO · Title", name: "title", widget: "string", required: false, hint: "Override title tag for this venue page." }
          - { label: "SEO · Description", name: "description", widget: "text", required: false, hint: "Short summary for search and social previews." }
          - { label: "SEO · Image", name: "social_image", widget: "image", required: false, hint: "Open Graph/Twitter image." }
      - label: "Venue"
        name: "venue"
        widget: "object"
        fields:
          - { label: "Basic Info · Name", name: "name", widget: "string", hint: "Public venue name." }
          - { label: "Basic Info · Slug", name: "slug", widget: "string", hint: "URL segment for this venue page (keep stable)." }
          - { label: "Basic Info · Tagline", name: "subtitle", widget: "string", required: false, hint: "Short one-line positioning statement." }
          - { label: "Basic Info · Short Description", name: "short_description", widget: "text", required: false, hint: "1–2 sentence summary for listings/cards." }
          - { label: "Basic Info · Long Description", name: "review", widget: "markdown", required: false, hint: "Main editorial review body shown on the venue page." }
          - { label: "Location · City", name: "city", widget: "string", hint: "City display name (for example: New York City)." }
          - { label: "Location · Region", name: "region", widget: "string", required: false, hint: "State/province/region." }
          - { label: "Location · Country", name: "country", widget: "string", required: false, default: "United States" }
          - { label: "Location · Neighborhood", name: "neighborhood", widget: "string", required: false }
          - { label: "Location · Address", name: "address", widget: "text", required: false }
          - { label: "Location · Latitude", name: "lat", widget: "number", value_type: "float", required: false, min: -90, max: 90 }
          - { label: "Location · Longitude", name: "lng", widget: "number", value_type: "float", required: false, min: -180, max: 180 }
          - { label: "Links · Website URL", name: "website_url", widget: "string", required: false }
          - { label: "Links · Booking URL", name: "booking_url", widget: "string", required: false }
          - { label: "Links · Instagram URL", name: "instagram_url", widget: "string", required: false }
          - label: "Experience · Primary Archetype"
            name: "primary_archetype"
            widget: "select"
            required: false
            options: ["Luxury Bathhouse", "Social Sauna", "Traditional Banya", "Social Wellness Club", "Neighborhood Spa", "Regional Spa Resort", "Other"]
          - label: "Experience · Secondary Archetypes"
            name: "secondary_archetypes"
            widget: "select"
            required: false
            multiple: true
            options: ["Luxury Bathhouse", "Social Sauna", "Traditional Banya", "Social Wellness Club", "Neighborhood Spa", "Regional Spa Resort", "Other"]
          - label: "Experience · Bathhouse Type"
            name: "bathhouse_type"
            widget: "select"
            required: false
            options: ["Roman Thermal", "Nordic Sauna", "Russian Banya", "Turkish Hammam", "Korean Jjimjilbang", "Japanese Onsen", "Modern Hybrid", "Other"]
          - label: "Experience · Social Style"
            name: "social_style"
            widget: "select"
            required: false
            options: ["silent", "quiet", "mixed", "social", "event-driven"]
          - label: "Experience · Atmosphere Tags"
            name: "atmosphere_tags"
            widget: "select"
            required: false
            multiple: true
            options: ["candlelit", "minimalist", "luxury", "rustic", "nature-forward", "urban", "intimate", "high-energy", "serene", "ritual-focused"]
          - label: "Experience · Setting Tags"
            name: "setting_tags"
            widget: "select"
            required: false
            multiple: true
            options: ["hotel", "standalone", "members-club", "warehouse", "historic", "rooftop", "waterfront", "resort", "residential", "downtown"]
          - label: "Amenities / Rituals · Amenities"
            name: "amenities"
            widget: "select"
            required: false
            multiple: true
            options: ["sauna", "steam_room", "cold_plunge", "hot_pool", "thermal_circuit", "massage", "bodywork", "facials", "cryotherapy", "red_light", "compression", "recovery_clinic", "iv_therapy", "breathwork", "movement_classes", "lounges", "food_and_beverage"]
          - label: "Amenities / Rituals · Rituals"
            name: "rituals"
            widget: "select"
            required: false
            multiple: true
            options: ["aufguss", "guided_ritual", "sound_bath", "tea_ceremony", "scrub", "contrast_cycle", "community_event", "meditation", "breathwork_session", "seasonal_programming"]
          - { label: "Amenities / Rituals · Hours", name: "hours", widget: "text", required: false }
          - { label: "Amenities / Rituals · Price Tier", name: "price_tier", widget: "select", required: false, options: ["$", "$$", "$$$", "$$$$"] }
          - { label: "Amenities / Rituals · Reservation Required", name: "reservation_required", widget: "boolean", required: false, default: false }
          - { label: "Media · Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Media · Gallery"
            name: "gallery_images"
            widget: "list"
            required: false
            hint: "Add supporting venue images."
            field: { label: "Image", name: "image", widget: "image" }
          - { label: "SEO · Override Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO · Override Description", name: "seo_description", widget: "text", required: false }
          - { label: "SEO · Override Image", name: "seo_image", widget: "image", required: false }
          - { label: "SEO · Canonical Path Override", name: "canonical_path_override", widget: "string", required: false, hint: "Optional path override beginning with /." }
          - { label: "Publishing / Internal · Status", name: "status", widget: "select", required: false, default: "draft", options: ["draft", "reviewed", "published"] }
          - { label: "Publishing / Internal · Featured", name: "featured", widget: "boolean", required: false, default: false }
          - { label: "Publishing / Internal · Editor Notes", name: "editor_notes", widget: "markdown", required: false, hint: "Internal notes only." }
          - label: "Publishing / Internal · Source URLs"
            name: "source_urls"
            widget: "list"
            required: false
            field: { label: "Source URL", name: "source_url", widget: "string" }
          - { label: "Publishing / Internal · Last Verified At", name: "last_verified_at", widget: "datetime", required: false, format: "YYYY-MM-DDTHH:mm:ss.SSS[Z]", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
          - { label: "Legacy · Date Reviewed", name: "date_reviewed", widget: "string", required: false }
          - { label: "Legacy · Best For", name: "best_for", widget: "string", required: false }
          - { label: "Legacy · Price", name: "price", widget: "string", required: false }
          - { label: "Legacy · Score", name: "score", widget: "string", required: false, hint: "Existing page-compatible field. Do not use for canonical scoring." }
