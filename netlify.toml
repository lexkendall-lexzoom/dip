[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

[functions]
  included_files = [
    "data/processed/venues/*.canonical.json",
    "data/processed/scores/*.score.json",
    "data/processed/evidence/*.reviews.evidence.json"
  ]

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200
