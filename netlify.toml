[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["fs", "path", "url"]
  included_files = [
    "data/processed/venues/**",
    "data/processed/scores/**",
    "data/processed/evidence/**"
  ]

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/venues"
  to = "/.netlify/functions/venues/venues"
  status = 200

[[redirects]]
  from = "/venues/search"
  to = "/.netlify/functions/venues/venues/search"
  status = 200

[[redirects]]
  from = "/venues/:id"
  to = "/.netlify/functions/venues/venues/:id"
  status = 200
